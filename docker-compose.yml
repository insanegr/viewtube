# ============================================
# ViewTube — Docker Compose for Portainer
# ============================================
# Deploy as a Stack in Portainer.
# Use stack.env for secrets.
#
# Recommended split-mount setup:
# - /mnt/appdata/viewtube          → database + thumbnails + avatars + banners
# - /mnt/wdx6/viewtube-videos      → uploaded videos from the website
# - /mnt                           → read-only import source root (browse all mounted drives)
#
# This lets you add/remove HDD mounts on the host under /mnt
# without changing code. The import UI will browse inside /mnt.
# ============================================

services:
  viewtube:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: viewtube
    ports:
      - "3001:3000"
    volumes:
      # Main app data: DB + metadata + thumbnails + avatars + banners
      - /mnt/appdata/viewtube-data:/app/server/data

      # Uploaded videos stored on large HDD separately
      - /mnt/wdx6/viewtube-videos:/app/server/data/uploads/videos

      # Read-only root for all mounted drives / media sources
      - /mnt:/videos-root:ro
    env_file:
      - stack.env
    environment:
      - PORT=3000
      - DATA_DIR=/app/server/data
      - IMPORT_DIR=/videos-root
      - TZ=Europe/Athens
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/categories').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    restart: unless-stopped
